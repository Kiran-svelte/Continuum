services:
  # ─── Core Services ──────────────────────────────────────────────────────────

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./web/.env
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://continuum:continuum_pass@db:5432/continuum
      - DIRECT_URL=postgresql://continuum:continuum_pass@db:5432/continuum
      - CONSTRAINT_ENGINE_URL=http://constraint-engine:8001
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      constraint-engine:
        condition: service_healthy
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  constraint-engine:
    build:
      context: ./web/backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://continuum:continuum_pass@db:5432/continuum
      - FLASK_ENV=development
      - PORT=8001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: continuum
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: continuum_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuum"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ─── Monitoring (--profile monitoring) ─────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./web/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["monitoring"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=continuum
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./web/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    profiles: ["monitoring"]
    ports:
      - "3100:3100"
    volumes:
      - ./web/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml

  node-exporter:
    image: prom/node-exporter:v1.7.0
    profiles: ["monitoring"]
    ports:
      - "9100:9100"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
