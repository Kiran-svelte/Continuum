global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'continuum-web'
    static_configs:
      - targets: ['web:3000']
    metrics_path: '/api/enterprise/metrics'
    scrape_interval: 10s

  - job_name: 'constraint-engine'
    static_configs:
      - targets: ['constraint-engine:8001']
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
